technical_notes: |
  biothings-mcp (PyPI: biothings-mcp) is a FastMCP 3.x server wrapping the
  BioThings API suite (MyVariant.info, MyGene.info, MyDisease.info, MyChem.info).
  It runs as a stdio MCP server spawned via `uvx biothings-mcp`.

  MCP tools used:
    biothings_query_many_variants — batch variant lookup by rsid
      params: query_list (comma-separated rsids), scopes ("dbsnp.rsid"),
      fields (clinvar, gnomad, pharmgkb, dbsnp.gene)
    biothings_query_genes — gene search by symbol
      params: q ("symbol:APOE"), fields ("name,summary"), species ("human"),
      size (1)

  @modelcontextprotocol/sdk v1.29+ provides Client and StdioClientTransport.
  The client is a lazy singleton — spawned on first use, reused across requests.
  If the spawn fails (no uvx, no Python, network policy), _failed is set true
  and all subsequent calls return null immediately (no repeated spawn attempts).

  Privacy: MCP tool calls transmit only rsids and gene symbols — the same
  data that the direct HTTP path transmits. No genotypes, no raw genome data.

