qa_notes: |
  Manual QA: run `node server.mjs` locally with uvx installed. Upload a genome file.
  In the MeshPanel event log, verify:
  - kb-curator agent-start says "via MCP (biothings-mcp)"
  - tool-call events show "mcp:biothings_query_many_variants" and "mcp:biothings_query_genes"
  Then uninstall uvx or rename it, restart the server, and verify:
  - kb-curator agent-start says "via direct HTTP"
  - tool-call events show "http:myvariant.info/v1/variant"
  Deploy to Railway (no Python/uvx) and verify the HTTP fallback works in production.

