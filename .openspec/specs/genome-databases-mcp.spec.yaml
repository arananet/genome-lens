description: |
  Real MCP (Model Context Protocol) integration for genomics database queries.
  The kb-curator agent's variant and gene lookups now go through biothings-mcp
  via @modelcontextprotocol/sdk's StdioClientTransport, with automatic fallback
  to direct HTTP if the MCP server isn't available.

  Architecture:
    mesh/mcp-client.mjs — singleton MCP client that lazily spawns biothings-mcp
    via `uvx biothings-mcp` (stdio transport). Provides mcpBatchLookupVariants()
    and mcpLookupGene() that call biothings_query_many_variants and
    biothings_query_genes MCP tools respectively. Returns null on any failure
    so callers can fall back to direct HTTP.

    mesh/tools.mjs — batchLookupVariants() and lookupGene() now try MCP first,
    then fall back to direct HTTP (safeFetch to myvariant.info / mygene.info).
    Full-genome ClinVar pathogenic scan (scanVariantsForPathogenic) always uses
    direct HTTP — the MCP overhead isn't justified for 600K+ rsid bulk batching.

  The orchestrator event log reports which transport is active ("MCP (biothings-mcp)"
  or "direct HTTP") so the MeshPanel UI shows the real data path.

acceptance_criteria:
  - "Given uvx and biothings-mcp are available, when batchLookupVariants is called, then it uses biothings_query_many_variants via MCP stdio transport."
  - "Given uvx and biothings-mcp are available, when lookupGene is called, then it uses biothings_query_genes via MCP stdio transport."
  - "Given uvx is NOT available (e.g. Railway without Python), when batchLookupVariants is called, then it falls back to direct HTTP POST to myvariant.info."
  - "Given uvx is NOT available, when lookupGene is called, then it falls back to direct HTTP GET to mygene.info."
  - "Given the MCP server is spawned, when it fails mid-session (process crash), then subsequent calls return null and the HTTP fallback activates."
  - "Given the orchestrator runs with MCP available, when the kb-curator agent starts, then the event log reports 'via MCP (biothings-mcp)' in the agent-start summary."
  - "Given the orchestrator runs without MCP, when the kb-curator agent starts, then the event log reports 'via direct HTTP'."
  - "Given the server shuts down (SIGTERM/SIGINT), then the MCP client transport is closed cleanly."
  - "Given the full-genome ClinVar scan runs, then it always uses direct HTTP regardless of MCP availability (bulk batching, not MCP)."
  - "Given the browser SPA bundle, then no MCP client or @modelcontextprotocol/sdk code is included."

