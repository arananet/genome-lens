description: |
  A live agent mesh orchestrated as a server-side SSE pipeline
  (mesh/orchestrator.mjs). Five LLM-powered agents — each a genuine Cloudflare
  Workers AI call (@cf/nvidia/nemotron-3-120b-a12b) — are governed by a
  two-layer Oracle that enforces non-negotiable invariants.

  Pipeline: privacy-warden → kb-curator → Oracle → cf-synthesizer → ui-polisher.

  Layer 1 (deterministic): five regex/structural checks that form the hard floor.
  These can never be overridden by the LLM layer.

  Layer 2 (LLM governance): reviews all agent-generated text for nuanced
  violations the regex can't catch (subtle diagnostic phrasing, fabricated
  statistics, genotype leaks in natural language). Triggers a real
  revise-and-resubmit loop: the Oracle sends feedback to the originating agent,
  which re-drafts via a second LLM call; the revision is re-checked against
  deterministic invariants (max 1 retry, then deny).

  Agent decisions are logged to a Markdown LLM-wiki (wiki/) that serves as
  shared memory across sessions. The mesh runs server-side only — it is never
  bundled into the browser app. Only rsids and public KB metadata cross the
  wire; genotypes never leave the browser.

acceptance_criteria:
  - "Given a well-formed knowledge-base action (>=1 source + valid tier), when ruled by the Oracle deterministic layer, then the verdict is allow."
  - "Given a knowledge-base action with no sources or an invalid tier, when ruled, then the verdict is deny under the evidence-required invariant."
  - "Given a data-egress action carrying a personal genotype, when ruled, then the verdict is deny under the local-only invariant."
  - "Given report copy containing a personal risk percentage or diagnostic phrasing, when ruled, then the verdict is revise under the no-diagnosis invariant."
  - "Given vision report copy promising eyesight improvement, when ruled, then the verdict is deny under the no-vision-improvement invariant."
  - "Given CF credentials are configured, when the privacy-warden runs, then it performs both a regex pre-filter AND an LLM privacy audit of the outbound payload."
  - "Given CF credentials are configured, when the kb-curator fetches variant data, then it also drafts per-variant LLM interpretations via Cloudflare Workers AI."
  - "Given the Oracle LLM review returns revise for a curator-drafted text, when the revise loop runs, then the kb-curator re-drafts via a second LLM call and the revision is re-checked against deterministic invariants."
  - "Given a revised text that still violates an invariant after retry, then the finding is denied (max 1 retry)."
  - "Given the cf-synthesizer produces a narrative, when the ui-polisher runs, then it polishes the text via an LLM call and the result is checked against Oracle invariants before approval."
  - "Given CF credentials are NOT configured, when the pipeline runs, then it falls back to deterministic-only Oracle and data-only agents (no LLM calls, no crash)."
  - "Given the mesh, when an allowed action is submitted, then it is appended to the wiki decision log; denied actions are not committed."
  - "Given the browser app bundle, then no agent-mesh / node:fs code is included."

