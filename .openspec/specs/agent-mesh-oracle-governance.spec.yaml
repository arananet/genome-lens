technical_notes: |
  Oracle invariants (Layer 1) are implemented as deterministic checks in
  mesh/oracle.mjs returning the most severe verdict. Layer 2 uses cfAiRun()
  to call Cloudflare Workers AI for nuanced review of agent-generated text.
  The revise loop sends Oracle feedback to the curator agent, which re-drafts
  via a second LLM call; the revision is re-checked against Layer 1 only
  (no recursive LLM review) to prevent infinite loops.

  Memory is plain Markdown via node:fs; the charter and roster live in
  wiki/memory/. The mesh is never imported by src/App.tsx, so Vite tree-shakes
  it out of the SPA.

  LLM model: @cf/nvidia/nemotron-3-120b-a12b (free tier, 10K neurons/day).
  Batching: curator drafts interpretations in groups of 15; Oracle LLM reviews
  all texts in one call. Total LLM calls per pipeline run: ~4-6.

