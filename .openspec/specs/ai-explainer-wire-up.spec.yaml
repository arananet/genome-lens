technical_notes: |
  Oracle imported from src/mesh/oracle.ts directly (not the full mesh index) to
  avoid tree-shaking failure on memory.ts (node:fs). The data-egress payload body
  is a JSON string with separate rsid and genotype fields, so looksLikeGenotype
  (which matches "rs\d+\s*[:=]\s*[ACGT-]{2}") does not trigger.

  CF Workers AI REST endpoint:
    POST https://api.cloudflare.com/client/v4/accounts/{CF_ACCOUNT_ID}/ai/run/{model}
    Authorization: Bearer {CF_API_TOKEN}
    Body: { messages: [...], max_tokens: 320 }

  Node.js 22 (nixpacks) has native fetch — no node-fetch dependency needed.
  Express serves dist/ as static and falls back to dist/index.html for SPA routes.

