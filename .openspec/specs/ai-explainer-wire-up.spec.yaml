description: |
  Three connected changes that make the AI explainer visible and trustworthy:

  1. Express backend on Railway — replace the bare `serve` static server with a
     small Express server (server.mjs) that still serves dist/ as a static SPA
     but also exposes POST /api/explain. That endpoint reads CF_ACCOUNT_ID and
     CF_API_TOKEN from the Railway environment and proxies to Cloudflare Workers
     AI REST API, keeping credentials out of the browser bundle.

  2. Oracle badge in AiExplainer — before any request is sent, run the Oracle
     (src/mesh/oracle.ts, pure TypeScript, no Node deps) in the browser against
     a data-egress action representing the request. Display the verdict (allow /
     revise / deny) with a coloured badge. Only show the send button when verdict
     is allow. This makes the governance architecture visible.

  3. Friendlier AiExplainer UX — hide the raw JSON payload behind a collapsed
     disclosure widget; lead with the Oracle badge and a plain description; show
     the explanation prominently when received.

acceptance_criteria:
  - "Given CF_ACCOUNT_ID and CF_API_TOKEN are set in Railway env, when POST /api/explain is called with a valid variant context, then it returns HTTP 200 with { explanation: string }."
  - "Given the Express server is running, when GET / is requested, then it serves the Vite SPA (dist/index.html)."
  - "Given a VariantDetail is open, when the AiExplainer mounts, then it shows an Oracle verdict badge (green Allow / amber Revise / red Deny) before the send button."
  - "Given the Oracle verdict is allow, when the user clicks 'Explain', then the request is sent to /api/explain and the explanation is displayed."
  - "Given the Oracle verdict is deny or revise, then the send button is hidden and the reason is shown instead."
  - "Given the AiExplainer, the raw JSON payload is hidden behind a 'show what's sent' disclosure element by default."

test_plan:
  - "Unit test (mesh/oracle): data-egress of a normal variant context (transmitsGenome absent, JSON body without genotype rsid pattern) returns allow verdict."
  - "Unit test (mesh/oracle): data-egress with transmitsGenome:true returns deny with local-only invariant."
  - "Manual QA: on Railway, open a variant detail, verify Oracle badge shows green Allow, click Explain, verify explanation appears within ~10 s."

qa_notes: |
  Set CF_ACCOUNT_ID and CF_API_TOKEN in Railway env before deploying.
  In local dev, the /api/explain endpoint does not exist; the error state is shown.

out_of_scope:
