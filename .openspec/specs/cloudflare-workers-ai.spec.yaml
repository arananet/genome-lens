technical_notes: |
  Cloudflare Workers AI REST endpoint:
    POST https://api.cloudflare.com/client/v4/accounts/{account_id}/ai/run/{model}
    Header: Authorization: Bearer {api_token}
    Body: {"messages": [...]} for chat models

  Model: @cf/nvidia/nemotron-3-120b-a12b (free tier).

  Response extraction handles multiple CF model output formats:
    result.response (standard chat), result.generated_text,
    result.choices[0].message.content (OpenAI-compatible).

  Agent mesh batching strategy:
    - privacy-warden: 1 LLM call per pipeline run
    - kb-curator: 1 LLM call per batch of 15 variants
    - Oracle LLM: 1 call reviewing all texts at once
    - cf-synthesizer: 1 call
    - ui-polisher: 1 call
    Total: ~4-6 LLM calls per run (well within free tier)

  Python provider (providers/cloudflare_ai.py) uses httpx with stdlib
  urllib.request fallback. Not used by the agent mesh pipeline (Node.js).

