technical_notes: |
  Cloudflare Workers AI REST endpoint:
    POST https://api.cloudflare.com/client/v4/accounts/{account_id}/ai/run/{model}
    Header: Authorization: Bearer {api_token}
    Body: {"prompt": "<text>"} or {"messages": [...]} for chat models

  Free-tier recommended models for bioinformatics reasoning:
    @cf/meta/llama-3.1-8b-instruct
    @cf/microsoft/phi-3-mini-4k-instruct
    @cf/google/gemma-3-12b-it

  Use httpx (sync) — already a transitive dep of many bioinformatics packages.
  If httpx is absent, fall back to urllib.request (stdlib only).

