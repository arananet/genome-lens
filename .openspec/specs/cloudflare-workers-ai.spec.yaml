description: |
  Add Cloudflare Workers AI as a free LLM inference provider for genome-lens.
  Cloudflare Workers AI offers a free tier (10,000 neurons/day) with open-weight
  models (Llama 3.1, Phi-3, Gemma 3, etc.) accessible via REST API. This lets
  genome-lens run local reasoning over genomic data without cost, complementing
  the holy-bio-mcp database suite already configured. The provider module handles
  auth via CF_ACCOUNT_ID + CF_API_TOKEN env vars, exposes a simple
  synchronous `generate()` call, and lists available models.

acceptance_criteria:
  - "Given valid CF_ACCOUNT_ID and CF_API_TOKEN env vars, when generate() is called with a prompt and model name, then the module returns the text response string from Cloudflare Workers AI."
  - "Given an invalid or missing token, when generate() is called, then it raises CloudflareAIError with the HTTP status and error message."
  - "Given no arguments, when list_models() is called, then it returns a list of recommended free-tier model IDs available on Workers AI."
  - "Given the module is imported, when CloudflareAIClient is instantiated with explicit account_id and api_token kwargs, then it uses those values instead of env vars."

test_plan:
  - "Unit test: mock httpx.Client.post to return a 200 JSON payload; assert generate() extracts and returns the 'result.response' field."
  - "Unit test: mock httpx.Client.post to return a 400 JSON payload with 'errors'; assert generate() raises CloudflareAIError with the error text."
  - "Unit test: instantiate CloudflareAIClient with explicit kwargs; assert client.account_id and client.api_token match the supplied values."
  - "Unit test: call list_models(); assert the return value is a non-empty list of strings each starting with '@cf/'."

qa_notes: |
  Manual check: set real CF_ACCOUNT_ID + CF_API_TOKEN, run
  `python -c "from providers.cloudflare_ai import CloudflareAIClient; c=CloudflareAIClient(); print(c.generate('Summarise BRCA1 in one sentence.'))"`.
  Expect a non-empty string back within ~5 seconds.

out_of_scope:
  - "Streaming responses — synchronous single-shot calls only for now."
  - "Cloudflare AI Gateway (caching proxy) — out of scope for this spec."
  - "Embedding models — text generation only."
  - "Cloudflare MCP server for infrastructure (KV, D1, R2) — not related to LLM inference."

