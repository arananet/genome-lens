# Feature Spec — created by scripts/openspec scaffold

title: "VCF parser, clinical report export, and phenotype ranking"
slug: "vcf-parser-clinical-export"
type: feature
status: review

author: "Claude"
created_at: "2026-06-15"
updated_at: "2026-06-15"

roles:
  implementer: "@arananet"
  reviewer: "@arananet"
  qa: "@arananet"
  product_owner: "@arananet"

description: |
  Extend genome-lens to parse VCF v4.x single-sample clinical sequencing files,
  export a printable clinical findings report as PDF, and rank findings by
  relevance to a user-described phenotype using server-side AI. Replicates the
  analytical methods behind clinical bioinformatics platforms (variant detection,
  germline analysis) without referencing any specific brand. Includes synthetic
  test data for all four supported genome formats.

acceptance_criteria:
  - "Given a VCF v4.x file with ##fileformat=VCF header, when uploaded, then it is auto-detected and parsed with GT allele index resolution (0=REF, N=ALT[N-1]), chrN prefix stripping, indel skipping, and source='vcf'."
  - "Given a VCF with phased (|) or unphased (/) GT separators, when parsed, then both are handled correctly and genotypes are stored as two-character strings."
  - "Given a VCF where the ID field is '.', when parsed, then the rsid falls back to CHROM:POS format."
  - "Given a parsed genome with covered findings, when the user clicks 'Export report', then a full-screen overlay renders all findings grouped by category with tier chips, caveats, and an evidence tier legend."
  - "Given the clinical report overlay is open, when the user clicks 'Print / Save as PDF', then only the report content prints (no app background bleed-through), with white background and readable contrast."
  - "Given a POST to /api/phenotype-rank with a phenotype string and 1-50 findings, then the server returns a JSON array of { rsid, relevanceScore, reason } ranked by relevance."
  - "Given synthetic test samples for 23andMe, AncestryDNA, MyHeritage, and VCF formats, when parsed, then each sample has the expected source, variant count (>1500), and contains known KB rsids."

test_plan:
  - "Unit test: parseVcf resolves GT allele indices correctly (tests/samples.test.ts — VCF clinical sequencing sample, expects genome.source='vcf', variantCount>1500, rs4680 genotype='GA')."
  - "Unit test: detectFormat returns 'vcf' for ##fileformat=VCF header and #CHROM header."
  - "Unit test: GenomeSource union includes 'vcf' (type-level, verified by tsc --noEmit)."
  - "Integration test: synthetic samples for all four formats parse correctly (tests/samples.test.ts — 4 tests)."
  - "Visual test: clinical report PDF renders with white background, no bleed-through (Playwright print-media emulation)."

out_of_scope:
  - "Multi-sample VCF files (only single-sample supported)."
  - "Structural variants or indels (only SNPs are parsed)."
  - "Phenotype ranking UI component (endpoint exists but no frontend UI yet)."

implementation_notes: |
  - VCF parser at src/parse/parseVcf.ts uses normalizeChrom() for chrN prefix stripping.
  - Clinical report at src/ui/report/ClinicalReport.tsx uses window.print() with @media print CSS isolation via body.printing-report class.
  - Phenotype rank endpoint at POST /api/phenotype-rank in server.mjs.
  - Synthetic samples generated by scripts/generate-samples.py with fixed seeds for reproducibility.
