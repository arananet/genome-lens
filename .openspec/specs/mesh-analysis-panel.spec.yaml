description: |
  After a genome file is uploaded, the Mesh Analysis Panel in the Trace view
  makes the real agent pipeline visible and interactive. It is driven entirely
  by SSE events from the server-side orchestrator — no synthetic timers.

  Components:
  1. Canvas 2D mesh visualization — animated graph of six pipeline nodes
     (privacy-warden, kb-curator, Oracle, cf-synthesizer, ui-polisher,
     clinvar-scanner) plus MCP tool nodes (myvariant.info, mygene.info).
     Node status, edge activation, and particle bursts are driven by real
     SSE events. The Oracle→kb-curator edge animates during revise loops.

  2. Real-time event log — scrolling feed of every pipeline event: agent
     starts, MCP tool calls/results, Oracle rulings (allow/revise/deny),
     LLM-generated text (curator notes, synthesis, polished output), and
     pipeline completion stats.

  3. Oracle governance header — live allow/flagged counts from the server-side
     Oracle (falls back to browser-side review before pipeline completes).

  4. Live enrichment cards — per-variant cards showing ClinVar significance,
     gnomAD allele frequency, PharmGKB IDs, and LLM-drafted curator notes.

  5. Full-genome ClinVar pathogenic scan — progress bar + hit cards for
     Pathogenic/Likely pathogenic variants discovered across all 600K+ rsids.

  6. AI synthesis (opt-in) — "Synthesize with AI" button sends only aggregate
     counts to /api/synthesize → Cloudflare Workers AI.

acceptance_criteria:
  - "Given a genome file is loaded, when the pipeline starts, then the Canvas 2D mesh shows all six agent nodes and animates transitions driven by real SSE events."
  - "Given the pipeline is running, when agent-start events arrive, then the corresponding node shows a running spinner and edge particles flow."
  - "Given the Oracle issues a revise ruling, when the event arrives, then the Oracle→kb-curator edge animates with particles and the Oracle node shows amber status."
  - "Given the ui-polisher agent runs, when its agent-text event arrives, then the ui-polisher node transitions to done and particles flow to data-out."
  - "Given the pipeline completes, when pipeline-done arrives, then the event log shows enriched/approved/denied counts and the Oracle header updates."
  - "Given covered findings, when the Oracle reviews each, then the panel shows total allow/flagged counts with a green or amber badge."
  - "Given the Synthesize button is clicked, when POST /api/synthesize returns, then a plain-language paragraph appears (no genotype data sent)."
  - "Given CF vars are missing, when Synthesize is clicked, then an informative error is shown."
  - "Given enrichment data includes curatorNote fields, then the enrichment cards display LLM-drafted interpretations in italics."

test_plan:
  - "Unit test (analysis/mesh-review): reviewAllFindings on standard KB interpretations returns allow for all."
  - "Unit test (analysis/mesh-review): a finding whose interpretation contains 'you have a 80% risk' receives verdict revise."
  - "Unit test (MeshViz): NODE_DEFS includes all six agent nodes plus MCP nodes."
  - "Unit test (MeshViz): EDGE_PAIRS includes the oracle→kb-curator revise edge."
  - "Manual QA: upload a file with CF credentials set, verify all six agents appear in event log with LLM text, Oracle revise loop visible when triggered, enrichment cards show curator notes."

qa_notes: |
  Inspect DevTools Network tab: POST /api/synthesize payload must contain only
  aggregate counts, not rsids or genotypes. POST /api/mesh-analyze payload
  must contain only rsids and public KB metadata, never genotypes.

out_of_scope:
