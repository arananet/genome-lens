technical_notes: |
  MeshCanvas.tsx maps SSE event types to MeshViz canvas transitions. The
  applyEvent function handles agent-start, tool-call, tool-result,
  oracle-ruling (including revise → Oracle→kb-curator edge), agent-text
  (including ui-polisher), agent-done, pipeline-done, and pipeline-blocked.

  The event log renders all event types including the new LLM-generated
  agent-text events from kb-curator, cf-synthesizer, and ui-polisher.

  /api/synthesize payload: { totals: { parsed, matched, covered },
    breakdown: Record<category, { A, B, C }> } — no personal data.

