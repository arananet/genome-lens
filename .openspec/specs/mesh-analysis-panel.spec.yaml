description: |
  After a genome file is uploaded, show a Mesh Analysis Panel in the Trace view
  that makes the agent mesh and Oracle governance visible and actionable.

  Three layers:
  1. Agent provenance - parser-smith (parsed N variants), kb-curator (matched M
     knowledge-base entries), privacy-warden (no data left device).
  2. Oracle governance summary - the Oracle reviews each covered finding as a
     report-copy action (checks for diagnostic phrasing / risk percentages /
     vision-improvement claims). Shows allow/revise/deny counts with a badge.
  3. AI synthesis (opt-in) - "Synthesize with AI" button sends only aggregate
     counts (category x tier matrix, no rsids, no genotypes) to /api/synthesize
     on the Express server -> Cloudflare Workers AI returns a plain-language paragraph.

acceptance_criteria:
  - "Given a genome file is loaded, when the Trace view renders, then MeshPanel shows agent-provenance rows with accurate counts."
  - "Given covered findings, when the Oracle reviews each as a report-copy action, then the panel shows total allow/flagged counts with a green or amber badge."
  - "Given the Synthesize button is clicked, when POST /api/synthesize returns, then a plain-language paragraph appears (no genotype data sent)."
  - "Given CF vars are missing, when Synthesize is clicked, then an informative error is shown."

test_plan:
  - "Unit test (analysis/mesh-review): reviewAllFindings on standard KB interpretations returns allow for all (no diagnostic phrasing in KB)."
  - "Unit test (analysis/mesh-review): a finding whose interpretation contains 'you have a 80% risk' receives verdict revise under no-diagnosis."
  - "Manual QA: upload a file, verify MeshPanel shows correct counts and Oracle badge, click Synthesize, verify paragraph returned."

qa_notes: |
  Inspect DevTools Network tab: POST /api/synthesize payload must contain only
  aggregate counts, not rsids or genotypes.

out_of_scope:
  - "Per-finding Oracle badges in the trace or reports views."
  - "Running WikiMemory or AgentMesh (Node.js) in the browser."
  - "Streaming the synthesis response."

