technical_notes: |
  Stack: Vite + TypeScript + React 18, Tailwind, three.js via @react-three/fiber
  + @react-three/drei, visx/d3 for 2D, fflate for zip, Zustand for state, Vitest +
  Testing Library for tests. Parser must stream-parse (~600k lines < 2s target).
  The AI explainer is a separate Cloudflare Worker (worker/) proxying Workers AI;
  the SPA targets it via VITE_AI_WORKER_URL. Static SPA deploys to Railway via
  railway.json + nixpacks.toml, served from dist/ with `serve`.
  Local-only constraint (no genome egress) overrides any conflicting requirement.

